<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday David & Abi</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0ea5e9,#2563eb,#7c3aed);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.card{
max-width:900px;
width:100%;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}
h1{
font-size:3rem;
margin-bottom:10px;
}
p{
font-size:1.2rem;
line-height:1.6;
}
.message{
margin-top:20px;
font-size:1.3rem;
font-weight:bold;
}
.blessing{
margin-top:20px;
font-size:1.1rem;
opacity:0.9;
}
.footer{
margin-top:30px;
font-size:0.9rem;
opacity:0.8;
}
.confetti{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}
.confetti div{
position:absolute;
width:10px;
height:10px;
background:yellow;
animation:fall 5s linear infinite;
}
@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(100vh);}
}
</style>
</head>
<body>

<div class="confetti">
<div style="left:10%"></div>
<div style="left:30%"></div>
<div style="left:50%"></div>
<div style="left:70%"></div>
<div style="left:90%"></div>
</div>

<div class="card">
<h1>Happy Birthday 🎉</h1>
<h2>David & Abi</h2>

<p class="message">
Two brothers, one birthday, and a million perfect shots—may your lives always stay in high resolution!
</p>

<p class="blessing">
God bless you and let this year be the year of breakthrough 🙏
</p>

<p>
Wishing you both endless happiness, success, and unforgettable memories!
</p>

<div class="footer">
Made with ❤️ just for you
</div>
</div>

</body>
</html>
